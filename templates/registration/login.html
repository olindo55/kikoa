<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kikoa — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF6DE;
    --surface: #FFE394;
    --surface2: #f7e8c3;
    --border: rgba(0,0,0,0.08);
    --accent: #8BDFDD;
    --text: #2D2D2D;
    --muted: #6B6B6B;
    --red: #F48F68;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background-image:
      radial-gradient(ellipse at 15% 20%, rgba(139,223,221,0.2) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(244,143,104,0.15) 0%, transparent 50%);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%; max-width: 380px;
    margin: 1rem;
  }

  .brand {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 2rem;
  }
  .brand-logo {
    width: 38px; height: 38px; background: var(--accent);
    border-radius: 11px; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; box-shadow: 0 0 20px rgba(139,223,221,0.5);
  }
  .brand h1 {
    font-family: 'Syne', sans-serif; font-size: 1.5rem;
    font-weight: 800; letter-spacing: -0.02em;
  }
  .brand h1 span { color: var(--accent); }

  h2 {
    font-family: 'Syne', sans-serif; font-size: 1.3rem;
    font-weight: 800; margin-bottom: 0.35rem;
  }
  .subtitle {
    font-size: 0.85rem; color: var(--muted); margin-bottom: 1.75rem;
  }

  .field { margin-bottom: 1rem; }
  label {
    display: block; font-size: 0.75rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.35rem;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.7rem 0.9rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
    color: var(--text); outline: none; transition: border-color 0.2s;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--accent); }

  .btn-submit {
    width: 100%; padding: 0.75rem;
    background: var(--accent); color: var(--text); border: none;
    border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; margin-top: 0.5rem;
  }
  .btn-submit:hover {
    filter: brightness(1.05); transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(139,223,221,0.5);
  }

  .errors {
    background: rgba(224,96,96,0.1); border: 1px solid rgba(224,96,96,0.25);
    border-radius: 9px; padding: 0.7rem 0.9rem;
    font-size: 0.84rem; color: var(--red);
    margin-bottom: 1rem; list-style: none;
  }
  .errors li::before { content: "⚠ "; }

  .footer-note {
    text-align: center; font-size: 0.78rem;
    color: var(--muted); margin-top: 1.5rem;
  }
</style>
</head>
<body>

<div class="login-box">
  <div class="brand">
    <div class="brand-logo">🎯</div>
    <h1>Ki<span>koa</span></h1>
  </div>

  <h2>Connexion</h2>
  <p class="subtitle">Organise tes événements et dépenses entre amis.</p>

  {% if form.errors %}
  <ul class="errors">
    <li>Identifiant ou mot de passe incorrect.</li>
  </ul>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div class="field">
      <label for="id_username">Identifiant</label>
      <input type="text" id="id_username" name="username"
             placeholder="Ton identifiant" autofocus autocomplete="username">
    </div>

    <div class="field">
      <label for="id_password">Mot de passe</label>
      <input type="password" id="id_password" name="password"
             placeholder="••••••••" autocomplete="current-password">
    </div>

    <button type="submit" class="btn-submit">Se connecter →</button>
  </form>

  <p class="footer-note">Pas encore de compte ? <a href="{% url 'signup' %}" style="color: var(--accent); text-decoration: none; font-weight: 600;">Inscris-toi ici</a>.</p>
</div>

</body>
</html>
