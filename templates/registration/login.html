{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kikoa — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;1,9..144,700;1,9..144,800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="login-box">
  <div class="brand">
    <div class="brand-logo">🎯</div>
    <h1>Ki<span>koa</span></h1>
  </div>

  <h2>Connexion</h2>
  <p class="subtitle">Organise tes événements et dépenses entre amis.</p>

  {% if form.errors %}
  <ul class="errors">
    <li>Identifiant ou mot de passe incorrect.</li>
  </ul>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div class="field">
      <label for="id_username">Identifiant</label>
      <input type="text" id="id_username" name="username"
             placeholder="Ton identifiant" autofocus autocomplete="username">
    </div>

    <div class="field">
      <label for="id_password">Mot de passe</label>
      <input type="password" id="id_password" name="password"
             placeholder="••••••••" autocomplete="current-password">
    </div>

    <button type="submit" class="btn-submit">Se connecter →</button>
  </form>

  <p class="footer-note">Pas encore de compte ? <a href="{% url 'signup' %}">Inscris-toi ici</a>.</p>
</div>

</body>
</html>
