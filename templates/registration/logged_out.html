<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kikoa — Déconnexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF6DE;
    --surface: #FFE394;
    --surface2: #f7e8c3;
    --border: rgba(0,0,0,0.08);
    --accent: #8BDFDD;
    --text: #2D2D2D;
    --muted: #6B6B6B;
    --red: #F48F68;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background-image:
      radial-gradient(ellipse at 15% 20%, rgba(139,223,221,0.2) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(244,143,104,0.15) 0%, transparent 50%);
  }

  .logout-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%; max-width: 380px;
    margin: 1rem;
    text-align: center;
  }

  .brand {
    display: flex; align-items: center; gap: 0.6rem;
    justify-content: center; margin-bottom: 2rem;
  }
  .brand-logo {
    width: 38px; height: 38px; background: var(--accent);
    border-radius: 11px; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; box-shadow: 0 0 20px rgba(139,223,221,0.5);
  }
  .brand h1 {
    font-family: 'Syne', sans-serif; font-size: 1.5rem;
    font-weight: 800; letter-spacing: -0.02em;
  }
  .brand h1 span { color: var(--accent); }

  h2 {
    font-family: 'Syne', sans-serif; font-size: 1.3rem;
    font-weight: 800; margin-bottom: 0.35rem;
  }
  .subtitle {
    font-size: 0.85rem; color: var(--muted); margin-bottom: 1.75rem;
  }

  .btn-login {
    display: inline-block; width: 100%; padding: 0.75rem;
    background: var(--accent); color: var(--text); text-decoration: none;
    border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; margin-top: 0.5rem;
  }
  .btn-login:hover {
    filter: brightness(1.05); transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(139,223,221,0.5);
  }

</style>
</head>
<body>

<div class="logout-box">
  <div class="brand">
    <div class="brand-logo">🎯</div>
    <h1>Ki<span>koa</span></h1>
  </div>

  <h2>Déconnexion</h2>
  <p class="subtitle">Tu as été déconnecté avec succès. À bientôt !</p>

  <a href="{% url 'login' %}" class="btn-login">Se reconnecter →</a>
</div>

</body>
</html>
