{% extends 'base.html' %}
{% load static %}

{% block title %}Kikoa — Déconnexion{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
<div class="logout-box">
  <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
    <div class="brand-logo" style="height: 60px;">
      <img src="{% static 'images/logo.png' %}" alt="Kikoa Logo">
    </div>
  </div>

  <h2>Déconnexion</h2>
  <p class="subtitle">Tu as été déconnecté avec succès. À bientôt !</p>

  <a href="{% url 'login' %}" class="btn-login">Se reconnecter →</a>
</div>
</div>
{% endblock %}
